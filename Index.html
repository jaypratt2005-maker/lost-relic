<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The Lost Relic</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>The Lost Relic</h1>

<div id="game">
  <p id="story">You are in a mysterious room. Find the relic.</p>

  <div id="choices">
    <button onclick="enterRoom('room1')">Room 1</button>
    <button onclick="enterRoom('room2')">Room 2</button>
    <button onclick="enterRoom('room3')">Room 3</button>
  </div>

  <!-- Item Area -->
  <div id="item" style="display:none;">
    <img id="itemImage" src="" alt="Item" style="width:80px; cursor:pointer;">
  </div>

  <p id="inventory">Items: None</p>
</div>

<script src="game.js"></script>
</body>
</html>
